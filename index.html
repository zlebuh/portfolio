<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title"></title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="page">

    <header class="header">
      <div class="header-main">
        <div class="photo">
          <img src="profile-photo.jpg" alt="Fotografie">
        </div>
        <div class="name-block">
          <h1 data-content="name"></h1>
          <h2 data-content="title"></h2>
        </div>
      </div>
      <div class="contact-row">
        <div class="contact">
          <span><svg class="contact-icon" viewBox="0 0 24 24">
              <path d="M2 6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6Zm2 0 8 6 8-6" fill="none"
                stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            </svg><span data-content="email"></span></span>
          <span><svg class="contact-icon" viewBox="0 0 24 24">
              <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="1.8" />
              <path d="M7 10v7M7 7.2v.1M11 17v-4.5a2 2 0 0 1 4 0V17M11 17v-7M15 12.5V17" fill="none" stroke="currentColor"
                stroke-width="1.8" stroke-linecap="round" />
            </svg><a data-content="linkedin_label" data-content-href="linkedin_url" target="_blank" rel="noopener"></a></span>
          <span><svg class="contact-icon" viewBox="0 0 24 24">
              <path
                d="M9 19c-4.3 1.4-4.3-2.5-6-3m12 5v-3.5c0-1 .1-1.4-.5-2 2.8-.3 5.5-1.4 5.5-6a4.6 4.6 0 0 0-1.3-3.2 4.2 4.2 0 0 0-.1-3.2s-1.1-.3-3.5 1.3a12.3 12.3 0 0 0-6.4 0C6.1 2.8 5 3.1 5 3.1a4.2 4.2 0 0 0-.1 3.2A4.6 4.6 0 0 0 3.6 9.5c0 4.6 2.7 5.7 5.5 6-.6.6-.6 1.2-.5 2V21"
                fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            </svg><a data-content="github_label" data-content-href="github_url" target="_blank" rel="noopener"></a></span>
        </div>
        <button id="theme-toggle" class="theme-toggle" type="button" data-content-aria="theme_toggle_label">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="4.2" fill="none" stroke="currentColor" stroke-width="1.8" />
            <path d="M12 2.5v2.4M12 19.1v2.4M4.2 4.2l1.7 1.7M18.1 18.1l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.2 19.8l1.7-1.7M18.1 5.9l1.7-1.7"
              stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24">
            <path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z" fill="none" stroke="currentColor"
              stroke-width="1.8" stroke-linejoin="round" />
          </svg>
        </button>
      </div>
    </header>

    <section class="intro">
      <h3 data-content="intro_heading"></h3>
      <p data-content="intro_text"></p>
    </section>

    <section id="projects" class="projects">
      <p class="projects-loading" data-content="projects_loading"></p>
    </section>

    <footer data-content="footer"></footer>

  </div>

  <div id="lightbox" class="lightbox">
    <button id="lightbox-close" class="lightbox-close" type="button" data-content-aria="lightbox_close_label">&times;</button>
    <button id="lightbox-prev" class="lightbox-nav lightbox-prev" type="button" data-content-aria="lightbox_prev_label">&#8249;</button>
    <img id="lightbox-img" class="lightbox-img" alt="Screenshot">
    <button id="lightbox-next" class="lightbox-nav lightbox-next" type="button" data-content-aria="lightbox_next_label">&#8250;</button>
    <span id="lightbox-counter" class="lightbox-counter"></span>
  </div>

  <script src="script.js"></script>
</body>

</html>
