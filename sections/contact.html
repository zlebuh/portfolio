<div class="contact-inner">
  <div>
    <div class="section-label" data-i18n="contact.label">// Let's talk</div>
    <h2 class="contact-heading" data-i18n-html="contact.heading">Got an <em>idea?</em></h2>
    <p class="contact-sub" data-i18n="contact.sub">Have a startup idea or need an MVP built? I take projects from concept to launch. Let's talk.</p>
    <div class="contact-links">
      <a href="mailto:pezlebek@gmail.com" class="contact-link">
        <div class="contact-link-icon">&#9993;</div>
        <div class="contact-link-label">Email</div>
        <div class="contact-link-value">pezlebek@gmail.com</div>
      </a>
      <a target="_blank" href="https://github.com/zlebuh" class="contact-link">
        <div class="contact-link-icon">&#8997;</div>
        <div class="contact-link-label">GitHub</div>
        <div class="contact-link-value">github.com/zlebuh</div>
      </a>
      <a target="_blank" href="https://linkedin.com/in/petrzlebek" class="contact-link">
        <div class="contact-link-icon">in</div>
        <div class="contact-link-label">LinkedIn</div>
        <div class="contact-link-value">linkedin.com/in/petrzlebek</div>
      </a>
    </div>
  </div>
  <div>
    <form id="contact-form" class="contact-form">
      <div class="form-group">
        <label class="form-label" data-i18n="contact.formName">Name</label>
        <input type="text" name="name" class="form-input" placeholder="Your name" data-i18n-placeholder="contact.namePlaceholder" required>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="contact.formEmail">Email</label>
        <input type="email" name="email" class="form-input" placeholder="your@email.com" data-i18n-placeholder="contact.emailPlaceholder" required>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="contact.formMessage">Message</label>
        <textarea name="message" class="form-input" placeholder="Tell me about your project&hellip;" data-i18n-placeholder="contact.messagePlaceholder" required></textarea>
      </div>
      <div class="form-status"></div>
      <button type="submit" class="btn-send"><span data-i18n="contact.send">Send message</span> &rarr;</button>
    </form>
  </div>
</div>
