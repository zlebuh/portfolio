<div class="contact-inner">
  <div>
    <div class="section-label">// Let's talk</div>
    <h2 class="contact-heading">Got a project<br>in <em>mind?</em></h2>
    <p class="contact-sub">Open to new roles, freelance work, and interesting side projects. I reply within 24 hours.</p>
    <div class="contact-links">
      <a href="mailto:john@example.com" class="contact-link">
        <div class="contact-link-icon">&#9993;</div>
        <div class="contact-link-label">Email</div>
        <div class="contact-link-value">john@example.com</div>
      </a>
      <a href="#" class="contact-link">
        <div class="contact-link-icon">&#8997;</div>
        <div class="contact-link-label">GitHub</div>
        <div class="contact-link-value">github.com/johndoe</div>
      </a>
      <a href="#" class="contact-link">
        <div class="contact-link-icon">in</div>
        <div class="contact-link-label">LinkedIn</div>
        <div class="contact-link-value">linkedin.com/in/johndoe</div>
      </a>
    </div>
  </div>
  <div>
    <div class="contact-form">
      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" class="form-input" placeholder="Your name">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Message</label>
        <textarea class="form-input" placeholder="Tell me about your project&hellip;"></textarea>
      </div>
      <button class="btn-send">Send message &rarr;</button>
    </div>
  </div>
</div>
